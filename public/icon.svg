  <!-- Main Hexagonal Base -->
  <path d="M50 5L93.3 30V80L50 105L6.7 80V30L50 5Z" fill="url(#logo-grad)" fill-opacity="0.1" stroke="url(#logo-grad)" stroke-width="1.5" />
